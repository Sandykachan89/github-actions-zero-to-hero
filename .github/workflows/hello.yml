# This is workflow name
name: Hello
# runs on a trigger
on:
  workflow_dispatch: 
  # this are jobs inside the workflow 
jobs:
  # this is the name of job
  greet:
    # this is github runner, each job runs on runner
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello Dosto"
      - name: say hello to username
        run: echo "Hello $USER"
        
  details:
    runs-on: ubuntu-latest
    steps:
      - name: version of python, docker etc 
        run: docker --version && python --version    

