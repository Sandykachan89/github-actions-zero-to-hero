# this will deploy safe / secure / tested app to prod server

name: Deploy to server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
          - name: checkout code
            uses: actions/checkout@v4

          - name: ssh to prod server & create app folder
            uses: appleboy/ssh-action@v1.0.3
            with: 
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                   echo "Installling required packages and folders"
                   sudo apt-get update && sudo apt-get install docker.io docker-compose-v2-y
                   sudo usermod -aG docker $USER && newgrp docker
                   mkdir -p devops

          - name: copy the docker compose file
            uses: appleboy/scp-action@v1
            with:
               host: ${{ secrets.EC2_SSH_HOST }}
               username: ${{ secrets.EC2_SSH_USER }}
               key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
               source: docker-compose.yml
               target: ~/devops

          - name: ssh to prod server & run the app
            uses: appleboy/ssh-action@v1.0.3
            with: 
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                   echo "Running app"
                   export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER}}
                   export DOCKER_TAG=${{ github.sha}}
                   echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -username ${{ vars.DOCKERHUB_USER }} --pasword-stdin
                   cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always
                    